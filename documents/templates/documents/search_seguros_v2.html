<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Seguros | DocSearch</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="/static/documents/css/index_v2.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">
                    <i class="ti ti-shield-check"></i>
                </div>
                <span class="logo-text">DocSearch</span>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">Principal</div>
                <a href="/v2/seguros/" class="nav-link active">
                    <i class="ti ti-umbrella"></i>
                    <span>Seguros</span>
                </a>
                <a href="/v2/constancias/" class="nav-link">
                    <i class="ti ti-file-certificate"></i>
                    <span>Constancias</span>
                </a>
                <a href="/v2/tregistro/" class="nav-link">
                    <i class="ti ti-user-check"></i>
                    <span>T-Registro</span>
                </a>
                
                <div class="nav-section">Administración</div>
                <a href="#" class="nav-link">
                    <i class="ti ti-users"></i>
                    <span>Usuarios</span>
                </a>
                <a href="#" class="nav-link">
                    <i class="ti ti-settings"></i>
                    <span>Configuración</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div id="sidebarUser" class="sidebar-user"></div>
                <button class="btn btn-ghost w-full justify-start" id="btnLogout">
                    <i class="ti ti-logout"></i>
                    <span>Cerrar Sesión</span>
                </button>
            </div>
        </aside>

        <!-- Main -->
        <main class="main-content">
            <header class="top-bar">
                <div class="flex items-center gap-2">
                    <h1 class="text-xl font-bold">Buscador de Seguros</h1>
                </div>
                <div class="flex items-center gap-4">
                    <button class="btn btn-icon btn-ghost" id="btnThemeToggle" title="Cambiar Tema">
                        <i class="ti ti-sun"></i>
                    </button>
                    <div class="divider-v"></div>
                    <div class="user-pill">
                        <span id="topUserName">Usuario</span>
                    </div>
                </div>
            </header>

            <section class="content-area">
                <!-- Search Form Card -->
                <div class="card mb-6 animate-slide-up">
                    <div class="card-header">
                        <div class="flex items-center gap-2">
                            <i class="ti ti-filter text-primary"></i>
                            <h2 class="text-lg font-bold">Filtros de Búsqueda</h2>
                        </div>
                        <button type="button" class="btn btn-sm btn-ghost" id="btnMasivo">
                            <i class="ti ti-layers-intersect"></i> Búsqueda Masiva
                        </button>
                    </div>
                    <div class="card-body">
                        <form id="searchForm">
                            <!-- Masivo Hidden Panel -->
                            <div id="masivoContainer" class="masivo-panel d-none mb-6">
                                <label class="label">Ingresar códigos masivos</label>
                                <textarea id="id_masivo_data" name="masivo_data" class="input" rows="3" placeholder="Ej: 20123456789, 20987654321..."></textarea>
                                <p class="helper-text">Se buscarán todos los documentos para los identificadores ingresados.</p>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4">
                                <div class="form-group">
                                    <label class="label" for="id_certificado">Nº Certificado</label>
                                    <input type="text" id="id_certificado" name="certificado" class="input" placeholder="000000">
                                </div>
                                <div class="form-group">
                                    <label class="label" for="id_dni">DNI / CUIT</label>
                                    <input type="text" id="id_dni" name="dni" class="input" placeholder="Documento">
                                </div>
                                <div class="form-group">
                                    <label class="label" for="id_cuit">Empresa (CUIT)</label>
                                    <input type="text" id="id_cuit" name="cuit" class="input" placeholder="CUIT Empresa">
                                </div>
                                <div class="form-group">
                                    <label class="label" for="id_anio">Año</label>
                                    <select id="id_anio" name="anio" class="select">
                                        <option value="">- Año -</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="label" for="id_mes">Mes</label>
                                    <select id="id_mes" name="mes" class="select">
                                        <option value="">- Mes -</option>
                                    </select>
                                </div>
                            </div>

                            <div class="flex justify-between items-center mt-6 pt-6 border-t border-dashed">
                                <button type="button" class="btn btn-ghost" id="btnClear">
                                    <i class="ti ti-trash"></i> Limpiar Filtros
                                </button>
                                <button type="submit" class="btn btn-primary" id="btnSearch">
                                    <i class="ti ti-search"></i> Buscar Certificados
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Stats & Meta -->
                <div id="searchStats" class="mb-4 px-2"></div>

                <!-- Results Container -->
                <div class="relative min-h-[300px]">
                    <!-- Loader -->
                    <div id="searchLoader" class="loader-overlay d-none">
                        <div class="loader-spinner"></div>
                        <span>Buscando documentos...</span>
                    </div>

                    <div id="resultsContainer" class="animate-fade-in">
                        <div class="empty-state">
                            <i class="ti ti-search text-muted opacity-20" style="font-size: 64px;"></i>
                            <p>Ingresa criterios de búsqueda para visualizar resultados.</p>
                        </div>
                    </div>
                </div>

                <!-- Pagination -->
                <div id="paginationContainer" class="mt-8 flex justify-center"></div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="/static/documents/js/ui_core_v2.js"></script>
    <script src="/static/documents/js/search_seguros_v2.js"></script>
</body>
</html>
