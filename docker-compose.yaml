# version: '3.8'

services:
  
  # ═══════════════════════════════════════════════════
  # NUEVO: PostgreSQL para usuarios
  # ═══════════════════════════════════════════════════
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_DB: pdf_search
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - pdf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d pdf_search"]
      interval: 10s
      timeout: 5s
      retries: 5
  # ═══════════════════════════════════════════════════
  # SERVICIO 1: MinIO (Storage tipo S3)
  # ═══════════════════════════════════════════════════
  minio:
    image: minio/minio:latest  # 📦 Imagen oficial de MinIO
    container_name: minio-storage
    ports:
      - "9000:9000"   # API (para subir/descargar archivos)
      - "9001:9001"   # Web Console (interfaz gráfica)
    environment:
      MINIO_ROOT_USER: admin          # Usuario admin
      MINIO_ROOT_PASSWORD: password123  # ⚠️ Cambia esto en producción
    command: server /data --console-address ":9001"
    volumes:
      - ./minio/data:/data  # 💾 Guarda datos en tu disco local
    networks:
      - pdf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════
  # SERVICIO 2: Flask (API de búsqueda)
  # ═══════════════════════════════════════════════════
  flask-app:
    build: ./flask_project  # 🏗️ Construye desde Dockerfile local
    container_name: flask-api
    ports:
      - "5000:5000"  # Tu API estará en http://localhost:5000
    environment:
      MINIO_PUBLIC_ENDPOINT: localhost:9000  # ← URLs públicas
      MINIO_ENDPOINT: minio:9000  # 🔗 Se conecta al servicio "minio" y no a si mismo (localhost)
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123
      # NUEVAS variables para PostgreSQL
      DATABASE_URL: postgresql://admin:password123@postgres:5432/pdf_search
      JWT_SECRET_KEY: mi-super-secreto-jwt-2024-no-cambiar  # ✅ Clave fija para desarrollo
      PYTHONUNBUFFERED: 1  # ✅ Forzar que print() se muestre inmediatamente
    depends_on:
      postgres:  # ⏳ Espera a que PostgreSQL inicie primero
        condition: service_healthy
      minio:
        condition: service_healthy #⏳ Espera a que MinIO inicie
    volumes:
      - ./flask_project:/app  # 🔄 Hot-reload: cambios en código se reflejan al instante
    networks:
      - pdf-network

  django-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: django-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      # ═══════════════════════════════════════════════════
      # 🆕 CONFIGURACIÓN DE SEGURIDAD
      # ═══════════════════════════════════════════════════
      - DJANGO_ENV=${DJANGO_ENV:-production}  # Permite controlar entorno desde .env
      # ⚠️ IMPORTANTE: Genera una clave única y segura con:
      # python -c "from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())"
      - DJANGO_SECRET_KEY=tu-clave-super-secreta-generada-aqui-cambiar-en-produccion
      # ═══════════════════════════════════════════════════
      # Base de datos
      # ═══════════════════════════════════════════════════
      - POSTGRES_DB=pdf_search
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123  # ⚠️ Cambiar en producción
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      # ═══════════════════════════════════════════════════
      # MinIO / S3
      # ═══════════════════════════════════════════════════
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password123  # ⚠️ Cambiar en producción
      - DEBUG=False
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - pdf-network

networks:
  pdf-network:
    driver: bridge  # 🌉 Red privada para que los contenedores se hablen